{% extends 'base.html' %}
{% block content %}
<style>
    .form-control { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid #332815; border-radius: 6px; box-sizing: border-box; margin-bottom: 15px; }
    .mod-btn { background: linear-gradient(135deg, #15100a 0%, #000 100%); color: var(--gold-light); cursor: pointer; padding: 18px 20px; width: 100%; border: 1px solid #332815; border-right: 4px solid var(--gold-main); text-align: right; outline: none; font-size: 18px; font-weight: bold; border-radius: 8px; margin-bottom: 10px; }
    .mod-content { padding: 25px; display: none; background: #0a0806; border: 1px solid #332815; border-radius: 0 0 8px 8px; margin-top: -15px; margin-bottom: 20px; }
    .btn-gold { background: linear-gradient(45deg, var(--gold-dark), var(--gold-light)); color: #000; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: 900; width: 100%; }
    .btn-danger { background: linear-gradient(45deg, #8b0000, #e74c3c); color: #fff; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: 900; width: 100%; }
</style>

<div style="text-align: center; margin-bottom: 30px;">
    <div style="font-size: 50px; margin-bottom: 10px; text-shadow: 0 0 30px var(--gold-main);">👑</div>
    <h1 style="color: var(--gold-main); margin: 0;">لوحة تحكم الإمبراطور</h1>
</div>

<button type="button" class="mod-btn" onclick="toggleMod('mod-theme')">🛠️ 1. الصيانة والمظهر <span>▼</span></button>
<div id="mod-theme" class="mod-content">
    <strong style="color: #e74c3c; display: block; margin-bottom: 10px;">وضع الصيانة الشامل:</strong>
    <form action="/admin" method="POST" style="display:flex; gap:10px; margin-bottom: 20px;">
        <input type="hidden" name="action" value="setup_maintenance">
        <input type="number" name="m_duration" placeholder="مدة الصيانة (بالدقائق, 0 = إلغاء)" class="form-control" style="margin:0;">
        <input type="hidden" name="m_pages" value="all">
        <button type="submit" class="btn-danger" style="width: auto;">تفعيل</button>
    </form>
    
    <strong style="color: var(--gold-light); display: block; margin-bottom: 10px;">بانر الرئيسية:</strong>
    <form action="/admin" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="action" value="update_home_settings">
        <input type="text" name="home_title" value="{{ settings.home_title }}" class="form-control" placeholder="اسم البوابة">
        <input type="file" name="banner_file" accept="image/*" class="form-control" style="padding: 9px;">
        <button type="submit" class="btn-gold">حفظ الغلاف</button>
    </form>
</div>

<button type="button" class="mod-btn" onclick="toggleMod('mod-users')">👥 2. تجربة التتويج وإدارة اللاعبين <span>▼</span></button>
<div id="mod-users" class="mod-content">
    <div style="background: rgba(212,175,55,0.1); border: 1px dashed var(--gold-main); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
        <strong style="color: var(--gold-main); display: block; margin-bottom: 10px;">👑 تجربة مشهد التتويج:</strong>
        <form action="/" method="GET" style="display: flex; gap: 10px;">
            <input type="number" name="test_victory" placeholder="أدخل ID اللاعب..." class="form-control" style="margin:0;" required>
            <button type="submit" class="btn-gold" style="width: auto;">جرب المشهد ➔</button>
        </form>
    </div>
    
    <form action="/admin" method="GET" style="display: flex; gap: 10px; margin-bottom: 15px;">
        <input type="text" name="search_user" value="{{ search_query }}" placeholder="ابحث بالاسم أو ID..." class="form-control" style="margin:0;">
        <button type="submit" class="btn-gold" style="width: auto;">بحث</button>
    </form>
    <form action="/admin" method="POST">
        <input type="hidden" name="action" value="bulk_action">
        <div style="max-height: 250px; overflow-y: auto; background: #000; border: 1px solid #332815; padding: 10px; margin-bottom: 15px;">
            {% for u in users %}
            <div style="padding: 8px; border-bottom: 1px solid #111;">
                <input type="checkbox" name="selected_users" value="{{ u.id }}">
                <span style="color: #2ecc71;">[{{ u.status }}]</span>
                <a href="/hunter/{{ u.hunter_id }}" style="color: #fff; text-decoration: none;" target="_blank">ID:{{ u.hunter_id }} - {{ u.username }}</a>
            </div>
            {% endfor %}
        </div>
        <select name="bulk_type" class="form-control"><option value="activate">إحياء</option><option value="move_zone">نقل</option><option value="eliminate">إعدام</option><option value="hard_delete">مسح نهائي</option></select>
        <button type="submit" class="btn-danger">تنفيذ</button>
    </form>
</div>

<button type="button" class="mod-btn" onclick="toggleMod('mod-war')">⚔️ 3. مود الحرب الشاملة والنزيف <span>▼</span></button>
<div id="mod-war" class="mod-content">
    <form action="/admin" method="POST" style="margin-bottom: 20px; background: rgba(231,76,60,0.1); padding: 15px; border-radius: 8px;">
        <input type="hidden" name="action" value="toggle_war">
        <label style="color:#e74c3c; display:block; margin-bottom:10px;">مدة الحرب (ساعات) قبل الانتهاء الآلي:</label>
        <div style="display: flex; gap: 10px;">
            <input type="number" name="war_hours" class="form-control" style="margin:0;">
            <button type="submit" class="btn-danger" style="width: auto;">{{ 'إعلان السلام الفوري' if settings.war_mode else 'إشعال الحرب وبدء المؤقت' }}</button>
        </div>
    </form>
    <form action="/admin" method="POST">
        <input type="hidden" name="action" value="update_war_settings">
        <input type="number" name="war_kill_target" value="{{ settings.war_kill_target }}" placeholder="الهدف الآلي لإنهاء الحرب" class="form-control">
        <div style="display:flex; gap:10px;">
            <input type="number" name="bleed_rate_minutes" value="{{ settings.bleed_rate_minutes }}" placeholder="النزيف كل (دقيقة)" class="form-control">
            <input type="number" name="bleed_amount" value="{{ settings.bleed_amount }}" placeholder="مقدار النزيف" class="form-control">
        </div>
        <button type="submit" class="btn-gold">حفظ القوانين</button>
    </form>
</div>

<button type="button" class="mod-btn" onclick="toggleMod('mod-vote')">🗳️ 4. محكمة الأصوات (الطابق 3) <span>▼</span></button>
<div id="mod-vote" class="mod-content">
    <form action="/admin" method="POST" style="background: rgba(52,152,219,0.1); padding: 15px; border-radius: 8px;">
        <input type="hidden" name="action" value="toggle_floor3">
        <label style="color:#3498db; display:block; margin-bottom:10px;">إعدادات التصويت والنقل التلقائي:</label>
        <div style="display: flex; gap: 10px;">
            <input type="number" name="vote_hours" placeholder="المدة (بالساعات)" class="form-control" style="margin:0;">
            <input type="number" name="top_n" placeholder="عدد الناجين" class="form-control" style="margin:0;" value="5">
        </div>
        <button type="submit" class="btn-gold" style="background: #3498db; color: #fff; margin-top: 10px;">{{ 'إغلاق المحكمة' if settings.floor3_mode_active else 'فتح التصويت وبدء المؤقت' }}</button>
    </form>
</div>

<button type="button" class="mod-btn" onclick="toggleMod('mod-poneglyph')">🗿 5. البونغليف وتطهير السيرفر <span>▼</span></button>
<div id="mod-poneglyph" class="mod-content">
    <form action="/admin" method="POST" style="margin-bottom: 20px;">
        <input type="hidden" name="action" value="clear_all_logs">
        <button type="submit" class="btn-danger" onclick="return confirm('تأكيد مسح جميع السجلات المخفية لتسريع الموقع؟');">⚠️ تطهير كل السجلات والمخلفات</button>
    </form>
    <form action="/admin" method="POST">
        <input type="hidden" name="action" value="update_poneglyph">
        <textarea name="poneglyph_text" class="form-control" rows="6" placeholder="نقش البونغليف...">{{ settings.poneglyph_text }}</textarea>
        <button type="submit" class="btn-gold">حفظ ونقش البونغليف</button>
    </form>
</div>

<script>
    function toggleMod(id) {
        var el = document.getElementById(id);
        el.style.display = (el.style.display === "block") ? "none" : "block";
    }
</script>
{% endblock %}

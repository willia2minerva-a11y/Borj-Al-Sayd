{% extends 'base.html' %}
{% block content %}
<!-- كود المتجر والغلاف كما هو -->
<div class="hunter-card" style="margin-top: 20px;">
    <h3>📜 نشر محتوى</h3>
    <form method="POST">
        <input type="hidden" name="action" value="add_news">
        <select name="category" class="form-group"><option value="news">خبر / لغز</option><option value="declaration">تصريح لاعب</option></select>
        <input type="text" name="author" placeholder="اسم صاحب التصريح (إن وجد)" class="form-group">
        <input type="text" name="title" placeholder="العنوان" class="form-group" required>
        <textarea name="content" rows="4" class="form-group" required></textarea>
        <!-- إعدادات الألغاز كما هي -->
        <button type="submit" class="btn-primary">نشر</button>
    </form>
</div>

<div class="hunter-card" style="overflow-x: auto; margin-top: 20px;">
    <h3>👥 إدارة جماعية للصيادين</h3>
    <form method="POST">
        <input type="hidden" name="action" value="bulk_action">
        <div style="display:flex; gap:10px; margin-bottom:15px; background:#111; padding:10px;">
            <select name="bulk_type">
                <option value="activate">تفعيل الجميع</option>
                <option value="freeze">تجميد الجميع</option>
                <option value="add_points">إضافة نقاط للجميع</option>
            </select>
            <input type="number" name="bulk_points" placeholder="قيمة النقاط" style="width:80px;">
            <button type="submit" class="btn-primary">تنفيذ المحدد</button>
        </div>
        <table>
            <tr><th>تحديد</th><th>الاسم (ID)</th><th>النقاط</th><th>الحالة</th></tr>
            {% for u in users %}
            <tr>
                <td><input type="checkbox" name="selected_users" value="{{ u.id }}"></td>
                <td>{{ u.username }} (#{{ u.hunter_id }})</td>
                <td>{{ u.points }}</td>
                <td>{{ '🟢' if u.status=='active' else '🔴' }}</td>
            </tr>
            {% endfor %}
        </table>
    </form>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block content %}
<h2 style="color: var(--zone-5-fire); text-align: center;">👑 كهف القيادة</h2>

<div class="hunter-card" style="border-color: #e74c3c; background: radial-gradient(circle at top, rgba(231, 76, 60, 0.1), transparent);">
    <h3 style="color: #e74c3c; margin-top: 0;">⚔️ غرفة عمليات المتاهة</h3>
    
    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <form method="POST" style="width: 50%; margin: 0;">
            <input type="hidden" name="action" value="toggle_maintenance">
            <button type="submit" class="btn-primary" style="background: {{ '#f39c12' if settings.maintenance_mode else '#444' }}; color: #fff; width: 100%;">
                {{ 'إيقاف الصيانة 🔓' if settings.maintenance_mode else 'تشغيل وضع الصيانة 🔒' }}
            </button>
        </form>
        
        <form method="POST" style="width: 50%; margin: 0;" onsubmit="return confirm('هل أنت متأكد من تغيير حالة الحرب في المتاهة؟');">
            <input type="hidden" name="action" value="toggle_war">
            <button type="submit" class="btn-danger" style="background: {{ '#c0392b' if settings.war_mode else '#27ae60' }}; color: #fff; width: 100%;">
                {{ 'إنهاء الحرب (وإعادة الصحة) 🕊️' if settings.war_mode else 'إعلان حرب الإبادة 🔥' }}
            </button>
        </form>
    </div>

    <form method="POST" style="background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; border: 1px dashed #e74c3c;">
        <input type="hidden" name="action" value="update_war_settings">
        <div style="display: flex; flex-wrap: wrap; gap: 10px;">
            <div style="width: 48%;"><label style="font-size: 11px;">النزيف كل (دقيقة):</label><input type="number" name="bleed_rate_minutes" value="{{ settings.bleed_rate_minutes }}" required></div>
            <div style="width: 48%;"><label style="font-size: 11px;">قوة النزيف (HP):</label><input type="number" name="bleed_amount" value="{{ settings.bleed_amount }}" required></div>
            <div style="width: 48%;"><label style="font-size: 11px;">أمان بعد الهجوم (دقيقة):</label><input type="number" name="safe_time_minutes" value="{{ settings.safe_time_minutes }}" required></div>
            <div style="width: 48%;"><label style="font-size: 11px;">عدد الموتى لإنهاء الحرب:</label><input type="number" name="max_dead_to_end" value="{{ settings.max_dead_to_end }}" required></div>
        </div>
        <div style="font-size: 12px; color: #ff9999; margin-top: 5px;">الموتى حالياً: {{ settings.dead_count }} / {{ settings.max_dead_to_end }}</div>
        <button type="submit" class="btn-primary" style="margin-top: 10px; padding: 5px; font-size: 12px; background: #e74c3c;">تحديث قوانين الحرب</button>
    </form>
</div>

<div class="hunter-card" style="margin-top: 20px;">
    <h3 style="color: var(--zone-3-gold); margin-top: 0;">🐪 إضافة لقافلة التجار (أسلحة/بضائع)</h3>
    <form method="POST" enctype="multipart/form-data">
        <input type="hidden" name="action" value="add_store_item">
        <input type="text" name="item_name" placeholder="اسم الأداة أو السلاح" required>
        <input type="text" name="item_desc" placeholder="التفاصيل" required>
        <input type="number" name="item_price" placeholder="سعر الشراء" required>
        <input type="file" name="item_image" accept="image/*">
        
        <div style="display: flex; gap: 5px; margin: 10px 0;">
            <select name="item_type" style="width: 50%; padding: 8px;">
                <option value="normal">بضاعة عادية 📦</option>
                <option value="weapon">سلاح (هجومي) 🗡️</option>
                <option value="heal">جرعة علاج 🧪</option>
                </select>
            <input type="number" name="effect_amount" placeholder="قوة الضرر/العلاج (إن وجد)" style="width: 50%;" value="0">
        </div>
        
        <button type="submit" class="btn-primary">إرسال للقافلة</button>
    </form>
</div>
{% endblock %}

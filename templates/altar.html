{% extends 'base.html' %}
{% block content %}
<style>
    .altar-container { background: radial-gradient(circle at center, #2c1e16 0%, #050403 100%); border: 2px solid #5a3e1b; border-radius: 15px; padding: 40px 20px; text-align: center; box-shadow: inset 0 0 50px rgba(0,0,0,0.9), 0 0 30px rgba(212,175,55,0.1); margin-top: 20px; position: relative; overflow: hidden; }
    .altar-container::before { content: '🔮'; position: absolute; font-size: 150px; opacity: 0.05; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: pulse 3s infinite alternate; pointer-events: none; }
    @keyframes pulse { 0% { opacity: 0.02; transform: translate(-50%, -50%) scale(0.9); } 100% { opacity: 0.08; transform: translate(-50%, -50%) scale(1.1); } }
    
    .altar-title { color: var(--gold-main); font-size: 35px; margin-bottom: 10px; text-shadow: 0 0 15px rgba(212,175,55,0.5); font-weight: 900; }
    .altar-desc { color: #aaa; font-size: 15px; margin-bottom: 30px; line-height: 1.6; }
    
    .spell-input { background: rgba(0,0,0,0.8); color: var(--gold-light); border: 2px dashed #5a3e1b; padding: 15px; width: 80%; max-width: 400px; border-radius: 8px; font-size: 20px; text-align: center; outline: none; margin-bottom: 20px; transition: 0.3s; font-family: monospace; letter-spacing: 2px; }
    .spell-input:focus { border-color: var(--gold-main); box-shadow: 0 0 20px rgba(212,175,55,0.2); }
    
    .btn-cast { background: linear-gradient(45deg, #8b0000, #e74c3c); color: #fff; border: none; padding: 15px 40px; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 18px; transition: 0.3s; box-shadow: 0 5px 15px rgba(231,76,60,0.4); text-transform: uppercase; }
    .btn-cast:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(231,76,60,0.6); }
</style>

<div class="altar-container">
    <h1 class="altar-title">مذبح الطلاسم</h1>
    <p class="altar-desc">هنا تُتلى الكلمات المنسية... قد تمنحك القوة، وقد تسلب روحك.<br>انطق التعويذة إذا كنت تملك الشجاعة.</p>
    
    <form action="/altar" method="POST" style="position: relative; z-index: 2;">
        <input type="text" name="spell_word" class="spell-input" placeholder="اكتب التعويذة هنا..." required autocomplete="off">
        <br>
        <button type="submit" class="btn-cast">إلقاء التعويذة ⚡</button>
    </form>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block content %}

<style>
    .altar-box { background: radial-gradient(circle, #1a0b1c 0%, #050403 100%); border: 1px solid #4a235a; border-radius: 14px; padding: 30px; text-align: center; box-shadow: 0 0 30px rgba(155,89,182,0.15); margin-bottom: 25px; }
    .altar-title { color: #9b59b6; font-size: 26px; font-weight: 900; margin: 0 0 10px 0; text-shadow: 0 0 15px rgba(155,89,182,0.4); }
    .altar-desc { color: #aaa; font-size: 14px; margin-bottom: 25px; line-height: 1.6; }
    
    .spell-input { width: 100%; padding: 18px; background: #000; color: #e0b0ff; border: 2px solid #4a235a; border-radius: 10px; font-size: 18px; text-align: center; outline: none; margin-bottom: 20px; font-weight: bold; transition: 0.3s; box-sizing: border-box; }
    .spell-input:focus { border-color: #9b59b6; box-shadow: 0 0 20px rgba(155,89,182,0.3); }
    
    .btn-spell { background: #150b1a; color: #9b59b6; border: 1px solid #9b59b6; padding: 16px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; }
    .btn-spell:active { transform: scale(0.97); background: #9b59b6; color: #fff; }
</style>

<div class="altar-box">
    <h2 class="altar-title">🔮 المذبح السري</h2>
    <p class="altar-desc">مكان مظلم تغمره طاقة غريبة... إذا كنت تملك كلمة سحرية (تعويذة)، انطقها هنا لتحصل على قدراتها.<br><span style="color:#e74c3c; font-weight:bold;">احذر!</span> نطق كلمات خاطئة سيغضب المذبح ويسلب من روحك.</p>
    
    <form action="/use_spell" method="POST">
        <input type="text" name="spell_word" class="spell-input" placeholder="...انطق التعويذة هنا..." required autocomplete="off">
        <button type="submit" class="btn-spell">إلقاء التعويذة ⚡</button>
    </form>
</div>

{% endblock %}

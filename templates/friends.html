{% extends 'base.html' %}
{% block content %}
<style>
    .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
    /* إصلاح خط خانة البحث وظهوره بوضوح */
    .form-control-search { flex: 1; padding: 15px; background: #000; color: #fff; border: 2px solid var(--gold-dark); border-radius: 8px; outline: none; font-size: 16px; font-weight: bold; transition: 0.3s; }
    .form-control-search:focus { border-color: var(--gold-light); box-shadow: 0 0 10px rgba(212,175,55,0.3); }
    .btn-gold { background: linear-gradient(45deg, var(--gold-dark), var(--gold-light)); color: #000; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 900; }
    .user-card { background: var(--bg-card); border: 1px solid #332815; border-radius: 10px; padding: 15px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
    .avatar-sm { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold-main); object-fit: cover; }
</style>

<div style="text-align: center; margin-bottom: 30px;">
    <h2 style="color: var(--gold-main); margin: 0;">🤝 التحالفات</h2>
    <p style="color: #aaa; font-size: 14px;">ابحث عن حلفاء أو خونة في المتاهة.</p>
</div>

<form action="/friends" method="GET" class="search-box">
    <input type="text" name="search" placeholder="ابحث بالاسم أو الـ ID..." class="form-control-search" required>
    <button type="submit" class="btn-gold">بحث 🔍</button>
</form>

{% if search_result %}
<div class="user-card" style="border-color: var(--gold-main); box-shadow: 0 0 15px rgba(212,175,55,0.2);">
    <div style="display: flex; align-items: center; gap: 15px;">
        <img src="/avatar/{{ search_result.hunter_id }}" class="avatar-sm">
        <div>
            <strong style="color: #fff; font-size: 16px;">{{ search_result.username }}</strong>
            <div style="color: #888; font-size: 12px;">ID: {{ search_result.hunter_id }}</div>
        </div>
    </div>
    <form action="/add_friend" method="POST" style="margin: 0;">
        <input type="hidden" name="target_id" value="{{ search_result.hunter_id }}">
        <button type="submit" class="btn-gold" style="padding: 8px 15px; font-size: 13px;">طلب تحالف</button>
    </form>
</div>
{% endif %}

{% endblock %}

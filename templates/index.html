{% extends 'base.html' %}
{% block content %}
<div class="global-banner"><h2>المرحلة الحالية: <span>{{ current_zone }}</span></h2></div>
<div class="hunter-card" style="text-align: center;">
    <h3>أهلاً بك في برج الصيد</h3>
    {% if session.get('user_id') %}
        <p>أنت الآن داخل البرج.</p><br>
        <a href="{{ url_for('profile') }}" class="btn-primary">🛡️ عرض رخصتي</a><br><br>
        <a href="{{ url_for('logout') }}" style="color:var(--zone-5-fire);">تسجيل الخروج</a>
    {% else %}
        <a href="{{ url_for('register') }}" class="btn-primary" style="margin-bottom:15px;">طلب الانضمام</a><br>
        <a href="{{ url_for('login') }}">تسجيل الدخول</a>
    {% endif %}
</div>
{% endblock %}

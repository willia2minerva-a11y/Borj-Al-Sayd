<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتاهة مغلقة</title>
    <style>
        body { background-color: #0a0a0a; color: #e2e8f0; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        h2 { color: #e74c3c; font-size: 2.5em; text-shadow: 0 0 10px #e74c3c; }
        p { font-size: 1.2em; max-width: 600px; line-height: 1.6; }
        .btn { display: inline-block; margin-top: 30px; padding: 10px 20px; background: #333; color: #fff; text-decoration: none; border-radius: 5px; border: 1px solid #555; }
        .btn:hover { background: #e74c3c; border-color: #ff9999; }
    </style>
</head>
<body>
    <h2>أبواب المتاهة مغلقة! 🛑</h2>
    
    <p>{{ message }}</p>
    
    {% if time_left %}
        <p style="color: #f1c40f; font-weight: bold;">الوقت المتبقي لفك القيد: {{ time_left }}</p>
    {% endif %}
    
    <a href="/logout" class="btn">تسجيل الخروج من المتاهة 🚪</a>
</body>
</html>

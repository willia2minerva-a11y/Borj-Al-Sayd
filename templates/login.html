<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عبور البوابة - متاهة سيفار</title>
    <style>
        body { background-color: #080604; background-image: radial-gradient(circle at center, #1a140a 0%, #000 100%); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: rgba(15, 12, 8, 0.9); padding: 40px; border-radius: 12px; border: 1px solid #d4af37; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 40px rgba(212,175,55,0.2); position: relative; overflow: hidden; backdrop-filter: blur(5px); }
        .auth-container::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, transparent, #d4af37, transparent); }
        h2 { color: #d4af37; font-size: 28px; text-shadow: 0 0 15px rgba(212,175,55,0.5); margin-top: 0; margin-bottom: 5px; }
        p { color: #a08c6c; font-size: 13px; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; color: #d4af37; font-size: 13px; font-weight: bold; }
        .form-group input { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid #44351c; border-radius: 6px; box-sizing: border-box; outline: none; transition: 0.3s; }
        .form-group input:focus { border-color: #d4af37; box-shadow: 0 0 10px rgba(212,175,55,0.3); }
        .btn-auth { width: 100%; padding: 14px; background: linear-gradient(45deg, #b8860b, #d4af37); color: #000; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 900; transition: 0.3s; box-shadow: 0 5px 15px rgba(212,175,55,0.4); }
        .btn-auth:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(212,175,55,0.6); }
        .auth-links { margin-top: 20px; font-size: 13px; color: #888; border-top: 1px dashed #333; padding-top: 15px; }
        .auth-links a { color: #d4af37; text-decoration: none; font-weight: bold; }
        .flash-msg { padding: 12px; margin-bottom: 15px; border-radius: 6px; font-size: 13px; font-weight: bold; }
        .flash-error { background: rgba(231,76,60,0.1); color: #e74c3c; border: 1px solid #e74c3c; }
        .flash-success { background: rgba(46,204,113,0.1); color: #2ecc71; border: 1px solid #2ecc71; }
    </style>
</head>
<body>
<div class="auth-container">
    <h2>بوابة المتاهة</h2>
    <p>أدخل هويتك لاختراق الجدار الحجري...</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for category, message in messages %}<div class="flash-msg flash-{{ category }}">{{ message }}</div>{% endfor %}{% endif %}
    {% endwith %}
    <form action="/login" method="POST">
        <div class="form-group"><label>اسم الرحالة (الهوية)</label><input type="text" name="username" required autocomplete="off" autofocus></div>
        <div class="form-group"><label>كلمة السر (الختم הסري)</label><input type="password" name="password" required></div>
        <button type="submit" class="btn-auth">اختراق البوابة 🚪</button>
    </form>
    <div class="auth-links">لا تملك ختماً للعبور؟ <a href="/register">انضم من هنا</a></div>
</div>
</body>
</html>

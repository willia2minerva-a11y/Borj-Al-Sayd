<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عبور البوابة - متاهة سيفار</title>
    <style>
        body { 
            background-color: #050505; /* أسود حالك */
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .auth-container { 
            background: #0d0d0d; 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.9); 
            position: relative; 
            overflow: hidden; 
        }
        /* الخط الذهبي/الأحمر العلوي */
        .auth-container::before { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 4px; 
            background: linear-gradient(90deg, #8b0000, #d4af37, #8b0000); 
        }
        
        h2 { 
            color: #d4af37; /* ذهبي عتيق */
            font-size: 28px;
            text-shadow: 0 0 15px rgba(212,175,55,0.4); 
            margin-top: 0;
            margin-bottom: 5px; 
            letter-spacing: 1px;
        }
        p { 
            color: #777; 
            font-size: 13px; 
            margin-bottom: 30px; 
        }
        
        .form-group { 
            margin-bottom: 20px; 
            text-align: right; 
        }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            color: #bbb; 
            font-size: 14px; 
            font-weight: bold; 
        }
        .form-group input { 
            width: 100%; 
            padding: 14px; 
            background: #000; 
            color: #fff; 
            border: 1px solid #444; 
            border-radius: 6px; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s; 
            font-size: 16px; 
            letter-spacing: 1px;
        }
        .form-group input:focus { 
            border-color: #d4af37; 
            box-shadow: 0 0 10px rgba(212,175,55,0.2); 
        }
        
        .btn-auth { 
            width: 100%; 
            padding: 15px; 
            background: #8b0000; /* أحمر دموي */
            color: #fff; 
            border: 1px solid #ff4c4c; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            transition: 0.3s; 
            margin-top: 10px;
        }
        .btn-auth:hover { 
            background: #a00000; 
            box-shadow: 0 0 20px rgba(139,0,0,0.6); 
            transform: translateY(-2px);
        }
        
        .auth-links { 
            margin-top: 25px; 
            font-size: 14px; 
            color: #888; 
            border-top: 1px dashed #333;
            padding-top: 20px;
        }
        .auth-links a { 
            color: #1abc9c; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        .auth-links a:hover { 
            color: #fff; 
            text-shadow: 0 0 10px #1abc9c; 
        }
        
        .flash-msg { 
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 6px; 
            font-size: 14px; 
            font-weight: bold; 
            animation: fadeIn 0.5s;
        }
        .flash-error { background: rgba(231,76,60,0.1); color: #e74c3c; border: 1px solid #e74c3c; }
        .flash-success { background: rgba(46,204,113,0.1); color: #2ecc71; border: 1px solid #2ecc71; }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>بوابة المتاهة</h2>
    <p>أدخل هويتك لاختراق الجدار الحجري...</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash-msg flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
        <div class="form-group">
            <label>اسم الرحالة (الهوية)</label>
            <input type="text" name="username" required autocomplete="off" autofocus placeholder="اكتب اسمك هنا...">
        </div>
        <div class="form-group">
            <label>كلمة السر (الختم السري)</label>
            <input type="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-auth">اختراق البوابة 🚪</button>
    </form>

    <div class="auth-links">
        لا تملك ختماً للعبور؟ <a href="/register">انضم للرحالة من هنا</a>
    </div>
</div>

</body>
</html>

{% extends 'base.html' %}
{% block content %}
<h2 style="color: #8B5A2B;" class="translatable" data-ar="📜 الأخبار" data-en="📜 News">📜 الأخبار</h2>

{% for n in news_list %}
<div class="hunter-card" style="padding: 0; border-color: #8B5A2B;">
    
    <div class="accordion-header" style="display: flex; justify-content: space-between; align-items: center; border-right-color: #8B5A2B;">
        <span style="color: var(--text-main);">{{ n.title }}</span>
        
        {% if session.get('role') == 'admin' %}
        <form method="POST" action="/delete_news/{{ n.id }}" style="margin: 0;" onsubmit="return confirm('تأكيد السحق؟');">
            <button type="submit" class="btn-danger" style="padding: 4px 10px; font-size: 11px;">سحق 🗑️</button>
        </form>
        {% endif %}
    </div>
    
    <div class="accordion-content">
        <p style="padding-top:15px; color: var(--text-muted); line-height: 1.6;">
            {{ n.content | safe | replace('<img', '<img loading="lazy" decoding="async"') }}
        </p>
        <br>
    </div>
</div>
{% else %}
<p style="color: var(--text-muted); text-align: center; margin-top: 30px;">لا توجد أخبار في الوقت الحالي.</p>
{% endfor %}
{% endblock %}

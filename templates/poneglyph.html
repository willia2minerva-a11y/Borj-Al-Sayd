{% extends 'base.html' %}
{% block content %}
<style>
    .stone-wall { 
        background-color: #1a1a1a; 
        background-image: radial-gradient(circle, #2a2a2a 0%, #050505 100%);
        border: 4px solid #333; 
        border-radius: 15px; 
        padding: 50px 30px; 
        min-height: 50vh; 
        text-align: center; 
        box-shadow: inset 0 0 50px #000, 0 10px 30px rgba(0,0,0,0.8); 
        position: relative;
    }
    .stone-text { 
        color: #f39c12; 
        font-size: 22px; 
        line-height: 2; 
        font-family: 'Courier New', Courier, monospace; 
        text-shadow: 0 0 10px rgba(243, 156, 18, 0.8), 0 0 20px rgba(243, 156, 18, 0.4); 
        white-space: pre-wrap;
        font-weight: bold;
    }
</style>

<div style="text-align: center; margin-bottom: 30px;">
    <h2 style="color: #f39c12; margin: 0; font-size: 32px; text-shadow: 0 0 15px rgba(243, 156, 18, 0.5);">🗿 بونغليف سيفار 🗿</h2>
    <p style="color: #888;">من يقرأ هذه الكلمات، فقد فك الختم واقترب من الحقيقة.</p>
</div>

<div class="stone-wall">
    {% if settings and settings.poneglyph_text and settings.poneglyph_text != '' %}
        <div class="stone-text">{{ settings.poneglyph_text }}</div>
    {% else %}
        <div class="stone-text" style="color: #555; text-shadow: none;">النقوش ممسوحة... الجدار صامت.</div>
    {% endif %}
</div>
{% endblock %}

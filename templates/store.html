{% extends 'base.html' %}
{% block content %}
<h2>🛒 المتجر</h2>
<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
    {% for item in items %}
    <div class="hunter-card" style="margin:0; text-align:center; padding:15px;">
        {% if item.image %}<img src="{{ item.image }}" style="width:100%; height:120px; object-fit:cover; border-radius:5px; margin-bottom:10px;">{% endif %}
        <h3 style="color: var(--zone-3-gold); margin: 0 0 5px 0;">{{ item.name }}</h3>
        <p style="font-size: 12px; color: var(--text-muted); height:40px; overflow:hidden;">{{ item.description }}</p>
        <div style="color: var(--zone-4-diamond); font-size: 20px; font-weight: bold; margin: 10px 0;">{{ item.price }} 💎</div>
        <form method="POST" action="/buy/{{ item.id }}">
            <button type="submit" class="btn-primary">شراء الآن</button>
        </form>
    </div>
    {% endfor %}
</div>
{% endblock %}
